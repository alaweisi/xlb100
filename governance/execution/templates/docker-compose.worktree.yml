name: ${COMPOSE_PROJECT_NAME:?COMPOSE_PROJECT_NAME is required}

# Disposable validation data plane for one managed Work Unit.
# Every invocation must use a unique project name and host-port pair from the
# Work Unit Manifest. Staging and production compose files are not overlays.
services:
  mysql:
    image: mysql:8
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "127.0.0.1:${WORKTREE_MYSQL_HOST_PORT:?WORKTREE_MYSQL_HOST_PORT is required}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - worktree
    labels:
      xlb.managed-worktree: "true"
      xlb.train-id: ${XLB_TRAIN_ID:?XLB_TRAIN_ID is required}
      xlb.work-unit-id: ${XLB_WORK_UNIT_ID:?XLB_WORK_UNIT_ID is required}
      xlb.worktree-slot: ${WORKTREE_SLOT:?WORKTREE_SLOT is required}
      xlb.lease-id: ${XLB_ENVIRONMENT_LEASE_ID:?XLB_ENVIRONMENT_LEASE_ID is required}
      xlb.manifest-digest: ${XLB_MANIFEST_DIGEST:?XLB_MANIFEST_DIGEST is required}
      xlb.base-commit: ${XLB_BASE_COMMIT:?XLB_BASE_COMMIT is required}
      xlb.run-nonce: ${XLB_RUN_NONCE:?XLB_RUN_NONCE is required}
      xlb.runtime-candidate-commit: ${XLB_RUNTIME_CANDIDATE_COMMIT:?XLB_RUNTIME_CANDIDATE_COMMIT is required}
      xlb.runtime-head-commit: ${XLB_RUNTIME_HEAD_COMMIT:?XLB_RUNTIME_HEAD_COMMIT is required}
      xlb.runtime-input-digest: ${XLB_RUNTIME_INPUT_DIGEST:?XLB_RUNTIME_INPUT_DIGEST is required}
      xlb.docker-engine-id: ${XLB_DOCKER_ENGINE_ID:?XLB_DOCKER_ENGINE_ID is required}
      xlb.docker-binding-digest: ${XLB_DOCKER_BINDING_DIGEST:?XLB_DOCKER_BINDING_DIGEST is required}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7
    restart: "no"
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${WORKTREE_REDIS_HOST_PORT:?WORKTREE_REDIS_HOST_PORT is required}:6379"
    volumes:
      - redis-data:/data
    networks:
      - worktree
    labels:
      xlb.managed-worktree: "true"
      xlb.train-id: ${XLB_TRAIN_ID:?XLB_TRAIN_ID is required}
      xlb.work-unit-id: ${XLB_WORK_UNIT_ID:?XLB_WORK_UNIT_ID is required}
      xlb.worktree-slot: ${WORKTREE_SLOT:?WORKTREE_SLOT is required}
      xlb.lease-id: ${XLB_ENVIRONMENT_LEASE_ID:?XLB_ENVIRONMENT_LEASE_ID is required}
      xlb.manifest-digest: ${XLB_MANIFEST_DIGEST:?XLB_MANIFEST_DIGEST is required}
      xlb.base-commit: ${XLB_BASE_COMMIT:?XLB_BASE_COMMIT is required}
      xlb.run-nonce: ${XLB_RUN_NONCE:?XLB_RUN_NONCE is required}
      xlb.runtime-candidate-commit: ${XLB_RUNTIME_CANDIDATE_COMMIT:?XLB_RUNTIME_CANDIDATE_COMMIT is required}
      xlb.runtime-head-commit: ${XLB_RUNTIME_HEAD_COMMIT:?XLB_RUNTIME_HEAD_COMMIT is required}
      xlb.runtime-input-digest: ${XLB_RUNTIME_INPUT_DIGEST:?XLB_RUNTIME_INPUT_DIGEST is required}
      xlb.docker-engine-id: ${XLB_DOCKER_ENGINE_ID:?XLB_DOCKER_ENGINE_ID is required}
      xlb.docker-binding-digest: ${XLB_DOCKER_BINDING_DIGEST:?XLB_DOCKER_BINDING_DIGEST is required}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
    labels:
      xlb.managed-worktree: "true"
      xlb.train-id: ${XLB_TRAIN_ID:?XLB_TRAIN_ID is required}
      xlb.work-unit-id: ${XLB_WORK_UNIT_ID:?XLB_WORK_UNIT_ID is required}
      xlb.lease-id: ${XLB_ENVIRONMENT_LEASE_ID:?XLB_ENVIRONMENT_LEASE_ID is required}
      xlb.manifest-digest: ${XLB_MANIFEST_DIGEST:?XLB_MANIFEST_DIGEST is required}
      xlb.base-commit: ${XLB_BASE_COMMIT:?XLB_BASE_COMMIT is required}
      xlb.run-nonce: ${XLB_RUN_NONCE:?XLB_RUN_NONCE is required}
      xlb.runtime-candidate-commit: ${XLB_RUNTIME_CANDIDATE_COMMIT:?XLB_RUNTIME_CANDIDATE_COMMIT is required}
      xlb.runtime-head-commit: ${XLB_RUNTIME_HEAD_COMMIT:?XLB_RUNTIME_HEAD_COMMIT is required}
      xlb.runtime-input-digest: ${XLB_RUNTIME_INPUT_DIGEST:?XLB_RUNTIME_INPUT_DIGEST is required}
      xlb.docker-engine-id: ${XLB_DOCKER_ENGINE_ID:?XLB_DOCKER_ENGINE_ID is required}
      xlb.docker-binding-digest: ${XLB_DOCKER_BINDING_DIGEST:?XLB_DOCKER_BINDING_DIGEST is required}
  redis-data:
    labels:
      xlb.managed-worktree: "true"
      xlb.train-id: ${XLB_TRAIN_ID:?XLB_TRAIN_ID is required}
      xlb.work-unit-id: ${XLB_WORK_UNIT_ID:?XLB_WORK_UNIT_ID is required}
      xlb.lease-id: ${XLB_ENVIRONMENT_LEASE_ID:?XLB_ENVIRONMENT_LEASE_ID is required}
      xlb.manifest-digest: ${XLB_MANIFEST_DIGEST:?XLB_MANIFEST_DIGEST is required}
      xlb.base-commit: ${XLB_BASE_COMMIT:?XLB_BASE_COMMIT is required}
      xlb.run-nonce: ${XLB_RUN_NONCE:?XLB_RUN_NONCE is required}
      xlb.runtime-candidate-commit: ${XLB_RUNTIME_CANDIDATE_COMMIT:?XLB_RUNTIME_CANDIDATE_COMMIT is required}
      xlb.runtime-head-commit: ${XLB_RUNTIME_HEAD_COMMIT:?XLB_RUNTIME_HEAD_COMMIT is required}
      xlb.runtime-input-digest: ${XLB_RUNTIME_INPUT_DIGEST:?XLB_RUNTIME_INPUT_DIGEST is required}
      xlb.docker-engine-id: ${XLB_DOCKER_ENGINE_ID:?XLB_DOCKER_ENGINE_ID is required}
      xlb.docker-binding-digest: ${XLB_DOCKER_BINDING_DIGEST:?XLB_DOCKER_BINDING_DIGEST is required}

networks:
  worktree:
    driver: bridge
    labels:
      xlb.managed-worktree: "true"
      xlb.train-id: ${XLB_TRAIN_ID:?XLB_TRAIN_ID is required}
      xlb.work-unit-id: ${XLB_WORK_UNIT_ID:?XLB_WORK_UNIT_ID is required}
      xlb.lease-id: ${XLB_ENVIRONMENT_LEASE_ID:?XLB_ENVIRONMENT_LEASE_ID is required}
      xlb.manifest-digest: ${XLB_MANIFEST_DIGEST:?XLB_MANIFEST_DIGEST is required}
      xlb.base-commit: ${XLB_BASE_COMMIT:?XLB_BASE_COMMIT is required}
      xlb.run-nonce: ${XLB_RUN_NONCE:?XLB_RUN_NONCE is required}
      xlb.runtime-candidate-commit: ${XLB_RUNTIME_CANDIDATE_COMMIT:?XLB_RUNTIME_CANDIDATE_COMMIT is required}
      xlb.runtime-head-commit: ${XLB_RUNTIME_HEAD_COMMIT:?XLB_RUNTIME_HEAD_COMMIT is required}
      xlb.runtime-input-digest: ${XLB_RUNTIME_INPUT_DIGEST:?XLB_RUNTIME_INPUT_DIGEST is required}
      xlb.docker-engine-id: ${XLB_DOCKER_ENGINE_ID:?XLB_DOCKER_ENGINE_ID is required}
      xlb.docker-binding-digest: ${XLB_DOCKER_BINDING_DIGEST:?XLB_DOCKER_BINDING_DIGEST is required}
