name: Phase 24 Completion Gates
on:
  pull_request:
  workflow_dispatch:
jobs:
  completion:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Phase 24 fail-closed completion gate
        shell: pwsh
        run: pnpm gate:phase24
