name: Phase 24D Support Realtime Gates
on:
  pull_request:
  workflow_dispatch:
jobs:
  phase24d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Phase 24D fail-closed aggregate gate
        shell: pwsh
        run: pnpm gate:phase24d
