name: Phase 23C Three-App Frontend Engineering Gates

on:
  push:
    branches: [main, master, codex/phase23c-three-app-frontend-engineering]
  pull_request:

jobs:
  phase23c:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: xlb_root_password
          MYSQL_DATABASE: xlb_local
          MYSQL_USER: xlb
          MYSQL_PASSWORD: xlb_local_password
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uxlb -pxlb_local_password"
          --health-interval=10s --health-timeout=5s --health-retries=8 --health-start-period=30s
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      NODE_ENV: test
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DATABASE: xlb_local
      MYSQL_USER: xlb
      MYSQL_PASSWORD: xlb_local_password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: phase23c-ci-secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Migrate database
        working-directory: backend
        run: pnpm exec tsx src/dal/migrateCli.ts
      - name: Seed database
        working-directory: backend
        run: pnpm exec tsx src/dal/seedCli.ts
      - name: Build workspace
        run: pnpm build
      - name: Typecheck workspace
        run: pnpm typecheck
      - name: Phase 23C hard-blocking gate
        run: pnpm gate:phase23c
      - name: Architecture preflight
        run: pwsh -NoProfile -File scripts/preflight-architecture.ps1
