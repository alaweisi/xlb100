name: xlb-staging

services:
  mysql:
    image: mysql:8
    container_name: xlb-mysql-staging
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xlb_staging}
      MYSQL_USER: ${MYSQL_USER:-xlb}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
    ports:
      - "${STAGING_MYSQL_PORT:-3307}:3306"
    volumes:
      - xlb-staging-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${MYSQL_USER:-xlb}", "-p${MYSQL_PASSWORD:-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: xlb-redis-staging
    restart: unless-stopped
    ports:
      - "${STAGING_REDIS_PORT:-6380}:6379"
    volumes:
      - xlb-staging-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: xlb-backend-staging
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xlb_staging}
      MYSQL_USER: ${MYSQL_USER:-xlb}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"

  customer:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: customer
    container_name: xlb-customer-staging
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "4173:4173"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: worker
    container_name: xlb-worker-staging
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "4174:4173"

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: admin
    container_name: xlb-admin-staging
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "4175:4173"

volumes:
  xlb-staging-mysql-data:
  xlb-staging-redis-data:
