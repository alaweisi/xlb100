name: xlb-production

# Phase 14 production scaffold.
# This file defines app services only and expects external production MySQL,
# Redis, ingress, TLS, secrets, monitoring, and backups.
# It is not production approval evidence by itself.

services:
  backend:
    image: ${PROD_BACKEND_IMAGE:-xlb/backend:phase14-placeholder}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_PORT: ${BACKEND_PORT:?BACKEND_PORT is required}
      MYSQL_HOST: ${MYSQL_HOST:?MYSQL_HOST is required}
      MYSQL_PORT: ${MYSQL_PORT:?MYSQL_PORT is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      REDIS_PORT: ${REDIS_PORT:?REDIS_PORT is required}
      RATE_LIMIT_BACKEND: redis
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-primary}
      JWT_KEYS_JSON: "${JWT_KEYS_JSON:?JWT_KEYS_JSON is required}"
      JWT_ISSUER: ${JWT_ISSUER:-xlb-backend}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-xlb-apps}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
      AUTH_PHONE_HASH_SECRET: ${AUTH_PHONE_HASH_SECRET:?AUTH_PHONE_HASH_SECRET is required}
      AUTH_OTP_PEPPER: ${AUTH_OTP_PEPPER:?AUTH_OTP_PEPPER is required}
      AUTH_OTP_TTL_SECONDS: ${AUTH_OTP_TTL_SECONDS:-300}
      AUTH_OTP_MAX_ATTEMPTS: ${AUTH_OTP_MAX_ATTEMPTS:-5}
      AUTH_OTP_LOCK_SECONDS: ${AUTH_OTP_LOCK_SECONDS:-900}
      AUTH_OTP_RESEND_COOLDOWN_SECONDS: ${AUTH_OTP_RESEND_COOLDOWN_SECONDS:-60}
      AUTH_DEBUG_CODE_ENABLED: "false"
    expose:
      - "${BACKEND_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${BACKEND_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xlb-production

  customer:
    image: ${PROD_CUSTOMER_IMAGE:-xlb/customer:phase14-placeholder}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: customer
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    expose:
      - "4173"
    networks:
      - xlb-production

  worker:
    image: ${PROD_WORKER_IMAGE:-xlb/worker:phase14-placeholder}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: worker
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    expose:
      - "4173"
    networks:
      - xlb-production

  admin:
    image: ${PROD_ADMIN_IMAGE:-xlb/admin:phase14-placeholder}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: admin
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    expose:
      - "4173"
    networks:
      - xlb-production

networks:
  xlb-production:
    driver: bridge
