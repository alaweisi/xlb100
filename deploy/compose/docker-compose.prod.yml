name: xlb-production

# Repository production scaffold. Images must be immutable registry digests.
# The Compose gateway terminates edge TLS; DNS/WAF or an L4 load balancer,
# managed databases/Redis, secret material and monitoring remain external.

x-backend-environment: &backend-environment
  NODE_ENV: production
  BACKEND_PORT: ${BACKEND_PORT:?BACKEND_PORT is required}
  MYSQL_HOST: ${MYSQL_HOST:?MYSQL_HOST is required}
  MYSQL_PORT: ${MYSQL_PORT:?MYSQL_PORT is required}
  MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
  MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
  MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
  MYSQL_TLS_ENABLED: "true"
  MYSQL_TLS_CA_FILE: /run/secrets/mysql_tls_ca
  REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
  REDIS_PORT: ${REDIS_PORT:?REDIS_PORT is required}
  REDIS_PASSWORD_FILE: /run/secrets/redis_password
  REDIS_TLS_ENABLED: "true"
  REDIS_TLS_CA_FILE: /run/secrets/redis_tls_ca
  RATE_LIMIT_BACKEND: redis
  TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
  JWT_SECRET_FILE: /run/secrets/jwt_secret
  JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-primary}
  JWT_KEYS_JSON_FILE: /run/secrets/jwt_keys_json
  JWT_ISSUER: ${JWT_ISSUER:-xlb-backend}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-xlb-apps}
  JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
  AUTH_PHONE_HASH_SECRET_FILE: /run/secrets/auth_phone_hash_secret
  AUTH_OTP_PEPPER_FILE: /run/secrets/auth_otp_pepper
  AUTH_OTP_TTL_SECONDS: ${AUTH_OTP_TTL_SECONDS:-300}
  AUTH_OTP_MAX_ATTEMPTS: ${AUTH_OTP_MAX_ATTEMPTS:-5}
  AUTH_OTP_LOCK_SECONDS: ${AUTH_OTP_LOCK_SECONDS:-900}
  AUTH_OTP_RESEND_COOLDOWN_SECONDS: ${AUTH_OTP_RESEND_COOLDOWN_SECONDS:-60}
  AUTH_DEBUG_CODE_ENABLED: "false"

x-backend-secrets: &backend-secrets
  - mysql_password
  - mysql_tls_ca
  - redis_password
  - redis_tls_ca
  - jwt_secret
  - jwt_keys_json
  - auth_phone_hash_secret
  - auth_otp_pepper

x-service-hardening: &service-hardening
  init: true
  restart: unless-stopped
  read_only: true
  user: node
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  tmpfs:
    - /tmp:size=64m,mode=1777
  logging:
    driver: json-file
    options:
      max-size: 20m
      max-file: "5"

x-gateway-hardening: &gateway-hardening
  init: true
  restart: unless-stopped
  read_only: true
  user: "101:101"
  cap_drop: [ALL]
  cap_add: [NET_BIND_SERVICE]
  security_opt: [no-new-privileges:true]
  tmpfs:
    - /tmp:size=32m,mode=1777
    - /var/cache/nginx:size=32m,uid=101,gid=101,mode=0755
    - /var/run:size=8m,uid=101,gid=101,mode=0755
    - /etc/nginx/conf.d:size=8m,uid=101,gid=101,mode=0755
  logging:
    driver: json-file
    options:
      max-size: 20m
      max-file: "5"

services:
  backend:
    <<: *service-hardening
    image: ${PROD_BACKEND_IMAGE:?PROD_BACKEND_IMAGE immutable digest is required}
    environment:
      <<: *backend-environment
      AUTO_RUN_ENABLED: "false"
    secrets: *backend-secrets
    expose: ["${BACKEND_PORT:-3000}"]
    healthcheck:
      test: [CMD-SHELL, "wget -qO- http://127.0.0.1:${BACKEND_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 2G }
        reservations: { cpus: "0.25", memory: 256M }
    networks: [xlb-production]

  jobs:
    <<: *service-hardening
    image: ${PROD_BACKEND_IMAGE:?PROD_BACKEND_IMAGE immutable digest is required}
    stop_grace_period: 30s
    working_dir: /app/backend
    command: [node, dist/jobWorker.js]
    environment:
      <<: *backend-environment
      AUTO_RUN_ENABLED: "true"
      AUTO_RUN_INTERVAL_MS: ${AUTO_RUN_INTERVAL_MS:-8000}
      AUTO_RUN_CITY_CODES: ${AUTO_RUN_CITY_CODES:?AUTO_RUN_CITY_CODES is required}
    secrets: *backend-secrets
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 2G }
        reservations: { cpus: "0.25", memory: 256M }
    networks: [xlb-production]

  gateway:
    <<: *gateway-hardening
    image: ${PROD_GATEWAY_IMAGE:?PROD_GATEWAY_IMAGE immutable digest is required}
    environment:
      XLB_DOMAIN: ${XLB_DOMAIN:?XLB_DOMAIN is required}
      NGINX_ENVSUBST_FILTER: ^XLB_DOMAIN$
    depends_on:
      backend: { condition: service_healthy }
      customer: { condition: service_started }
      worker: { condition: service_started }
      admin: { condition: service_started }
    volumes:
      - ../../infra/nginx/production.conf.template:/etc/nginx/templates/default.conf.template:ro
    secrets:
      - tls_fullchain
      - tls_private_key
    ports:
      - "${PROD_HTTP_BIND_ADDRESS:?PROD_HTTP_BIND_ADDRESS is required}:80:80"
      - "${PROD_HTTPS_BIND_ADDRESS:?PROD_HTTPS_BIND_ADDRESS is required}:443:443"
    healthcheck:
      test: [CMD-SHELL, "wget -qO- --no-check-certificate --header='Host: api.$${XLB_DOMAIN}' https://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.05", memory: 32M }
    networks: [xlb-production]

  customer:
    <<: *service-hardening
    image: ${PROD_CUSTOMER_IMAGE:?PROD_CUSTOMER_IMAGE immutable digest is required}
    depends_on:
      backend: { condition: service_healthy }
    expose: ["4173"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    networks: [xlb-production]

  worker:
    <<: *service-hardening
    image: ${PROD_WORKER_IMAGE:?PROD_WORKER_IMAGE immutable digest is required}
    depends_on:
      backend: { condition: service_healthy }
    expose: ["4173"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    networks: [xlb-production]

  admin:
    <<: *service-hardening
    image: ${PROD_ADMIN_IMAGE:?PROD_ADMIN_IMAGE immutable digest is required}
    depends_on:
      backend: { condition: service_healthy }
    expose: ["4173"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    networks: [xlb-production]

networks:
  xlb-production:
    driver: bridge

secrets:
  mysql_password:
    file: ${MYSQL_PASSWORD_SECRET_FILE:?MYSQL_PASSWORD_SECRET_FILE is required}
  mysql_tls_ca:
    file: ${MYSQL_TLS_CA_SECRET_FILE:?MYSQL_TLS_CA_SECRET_FILE is required}
  redis_password:
    file: ${REDIS_PASSWORD_SECRET_FILE:?REDIS_PASSWORD_SECRET_FILE is required}
  redis_tls_ca:
    file: ${REDIS_TLS_CA_SECRET_FILE:?REDIS_TLS_CA_SECRET_FILE is required}
  jwt_secret:
    file: ${JWT_SECRET_FILE:?JWT_SECRET_FILE is required}
  jwt_keys_json:
    file: ${JWT_KEYS_JSON_SECRET_FILE:?JWT_KEYS_JSON_SECRET_FILE is required}
  auth_phone_hash_secret:
    file: ${AUTH_PHONE_HASH_SECRET_FILE:?AUTH_PHONE_HASH_SECRET_FILE is required}
  auth_otp_pepper:
    file: ${AUTH_OTP_PEPPER_SECRET_FILE:?AUTH_OTP_PEPPER_SECRET_FILE is required}
  tls_fullchain:
    file: ${TLS_FULLCHAIN_SECRET_FILE:?TLS_FULLCHAIN_SECRET_FILE is required}
  tls_private_key:
    file: ${TLS_PRIVATE_KEY_SECRET_FILE:?TLS_PRIVATE_KEY_SECRET_FILE is required}
