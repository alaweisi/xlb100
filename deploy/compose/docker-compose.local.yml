services:
  mysql:
    image: mysql:8
    container_name: xlb-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: xlb_root_password
      MYSQL_DATABASE: xlb_local
      MYSQL_USER: xlb
      MYSQL_PASSWORD: xlb_local_password
    ports:
      - "3306:3306"
    volumes:
      - xlb_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uxlb", "-pxlb_local_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    container_name: xlb-redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - xlb_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  xlb_mysql_data:
  xlb_redis_data:
