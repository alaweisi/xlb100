{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "xlb.fullname" . }}-ingress
  labels:
    {{- include "xlb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "xlb.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "xlb.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
