apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "xlb.fullname" . }}-backend
  labels:
    {{- include "xlb.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  BACKEND_PORT: {{ .Values.backend.port | quote }}
  MYSQL_HOST: {{ .Values.config.mysql.host | quote }}
  MYSQL_PORT: {{ .Values.config.mysql.port | quote }}
  MYSQL_DATABASE: {{ .Values.config.mysql.database | quote }}
  MYSQL_USER: {{ .Values.config.mysql.user | quote }}
  MYSQL_TLS_ENABLED: {{ .Values.config.mysql.tlsEnabled | quote }}
  REDIS_HOST: {{ .Values.config.redis.host | quote }}
  REDIS_PORT: {{ .Values.config.redis.port | quote }}
  REDIS_TLS_ENABLED: {{ .Values.config.redis.tlsEnabled | quote }}
  RATE_LIMIT_BACKEND: {{ .Values.config.rateLimitBackend | quote }}
  TRUST_PROXY_HOPS: {{ .Values.config.trustProxyHops | quote }}
  JWT_ACTIVE_KID: {{ .Values.config.jwt.activeKid | quote }}
  JWT_ISSUER: {{ .Values.config.jwt.issuer | quote }}
  JWT_AUDIENCE: {{ .Values.config.jwt.audience | quote }}
  JWT_TTL_SECONDS: {{ .Values.config.jwt.ttlSeconds | quote }}
  AUTH_OTP_TTL_SECONDS: {{ .Values.config.auth.otpTtlSeconds | quote }}
  AUTH_OTP_MAX_ATTEMPTS: {{ .Values.config.auth.otpMaxAttempts | quote }}
  AUTH_OTP_LOCK_SECONDS: {{ .Values.config.auth.otpLockSeconds | quote }}
  AUTH_OTP_RESEND_COOLDOWN_SECONDS: {{ .Values.config.auth.otpResendCooldownSeconds | quote }}
  AUTH_DEBUG_CODE_ENABLED: {{ .Values.config.auth.debugCodeEnabled | quote }}
  XLB_OBJECT_STORAGE_PROVIDER: {{ .Values.config.objectStorage.provider | quote }}
  XLB_EXTERNAL_PROVIDER_EXECUTION_ENABLED: {{ .Values.config.objectStorage.externalExecutionEnabled | quote }}
  XLB_OBJECT_STORAGE_ROOT: {{ .Values.config.objectStorage.localRoot | quote }}
  XLB_COS_BUCKET: {{ .Values.config.objectStorage.cos.bucket | quote }}
  XLB_COS_REGION: {{ .Values.config.objectStorage.cos.region | quote }}
