{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "xlb.fullname" . }}-migration-{{ required "migration.runId is required" .Values.migration.runId }}
  labels:
    {{- include "xlb.componentLabels" (dict "root" . "component" "migration") | nindent 4 }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "xlb.selectorLabels" (dict "root" . "component" "migration") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "xlb.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "xlb.backendImage" . | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["node", "backend/dist/dal/migrateCli.js"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "xlb.fullname" . }}-backend
          env:
            - name: AUTO_RUN_ENABLED
              value: "false"
            {{- include "xlb.backendSecretEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            {{- include "xlb.runtimeVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "xlb.runtimeVolumes" . | nindent 8 }}
{{- end }}
