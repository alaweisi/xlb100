{{- range $name, $frontend := .Values.frontends }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xlb.fullname" $ }}-{{ $name }}
  labels:
    {{- include "xlb.componentLabels" (dict "root" $ "component" $name) | nindent 4 }}
spec:
  replicas: {{ $frontend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "xlb.selectorLabels" (dict "root" $ "component" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "xlb.selectorLabels" (dict "root" $ "component" $name) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "xlb.serviceAccountName" $ }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "xlb.image" (dict "image" $frontend.image) | quote }}
          imagePullPolicy: {{ $frontend.image.pullPolicy }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 4173
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml $frontend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
{{- end }}
