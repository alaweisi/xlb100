apiVersion: v1
kind: Service
metadata:
  name: {{ include "xlb.fullname" . }}-backend
  labels:
    {{- include "xlb.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "xlb.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
