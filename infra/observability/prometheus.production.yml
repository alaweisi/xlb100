global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/phase22-alert-rules.yml
  - /etc/prometheus/rules/production-alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: xlb-backend
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: [backend:3000]
