server {
  listen 80;
  server_name _;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location = /health {
    proxy_pass http://backend:3000/health;
  }

  location /api/ {
    proxy_pass http://backend:3000;
  }

  location = / {
    return 302 /customer/;
  }

  location /customer/assets/ {
    proxy_pass http://customer:4173/assets/;
  }

  location /customer/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/customer/assets/';
    sub_filter "='/assets/" "='/customer/assets/";
    proxy_pass http://customer:4173/;
  }

  location /worker/assets/ {
    proxy_pass http://worker:4173/assets/;
  }

  location /worker/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/worker/assets/';
    sub_filter "='/assets/" "='/worker/assets/";
    proxy_pass http://worker:4173/;
  }

  location /admin/assets/ {
    proxy_pass http://admin:4173/assets/;
  }

  location /admin/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/admin/assets/';
    sub_filter "='/assets/" "='/admin/assets/";
    proxy_pass http://admin:4173/;
  }
}
