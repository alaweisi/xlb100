server {
  listen 80;
  server_name _;

  auth_basic "喜乐帮隔离云测";
  auth_basic_user_file /etc/nginx/cloud-test.htpasswd;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location = /health {
    auth_basic off;
    proxy_pass http://backend:3000/health;
  }

  # Keep cloud-test entry authentication on OTP issuance/debug endpoints. Once
  # a business token exists, the backend's Bearer token owns Authorization;
  # Basic auth cannot share that header without forcing a false 401/logout.
  location ^~ /api/auth/ {
    proxy_pass http://backend:3000;
  }

  location = /api/auth/customer/logout {
    auth_basic off;
    proxy_pass http://backend:3000;
  }

  location /api/ {
    auth_basic off;
    proxy_pass http://backend:3000;
  }

  location = /api/support/realtime {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 90s;
    proxy_send_timeout 30s;
    proxy_buffering off;
  }

  location = / {
    return 302 /customer/;
  }

  location /customer/assets/ {
    proxy_pass http://customer:4173/assets/;
  }

  location /customer/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/customer/assets/';
    sub_filter "='/assets/" "='/customer/assets/";
    proxy_pass http://customer:4173/;
  }

  location /worker/assets/ {
    proxy_pass http://worker:4173/assets/;
  }

  location /worker/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/worker/assets/';
    sub_filter "='/assets/" "='/worker/assets/";
    proxy_pass http://worker:4173/;
  }

  location /admin/assets/ {
    proxy_pass http://admin:4173/assets/;
  }

  location /admin/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/admin/assets/';
    sub_filter "='/assets/" "='/admin/assets/";
    proxy_pass http://admin:4173/;
  }

  location /oa/assets/ {
    proxy_pass http://oa:4173/assets/;
  }

  location /oa/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/oa/assets/';
    sub_filter "='/assets/" "='/oa/assets/";
    proxy_pass http://oa:4173/;
  }

  location /dashboard/assets/ {
    proxy_pass http://dashboard:4173/assets/;
  }

  location /dashboard/ {
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '="/assets/' '="/dashboard/assets/';
    sub_filter "='/assets/" "='/dashboard/assets/";
    proxy_pass http://dashboard:4173/;
  }
}
